name: CI
on: [push, pull_request]

jobs:
  test-python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cg_test
          POSTGRES_USER: cguser
          POSTGRES_PASSWORD: testpass
        ports:
          - "5432:5432"
        options: --health-cmd pg_isready --health-interval 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
      mosquitto:
        image: eclipse-mosquitto:2
        ports:
          - "1883:1883"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: |
          pip install -r services/anpr-service/requirements.txt
          pip install -r edge/requirements.txt
          pip install pytest pytest-cov
      - name: Run Python tests
        env:
          USE_GPIO_MOCK: "true"
          USE_RFID_MOCK: "true"
          USE_CAMERA_MOCK: "true"
          GATE_ID: gate-test
          COMMUNITY_ID: test-community
          DEVICE_TOKEN: test-token
          MQTT_BROKER: localhost
          DATABASE_URL: postgresql://cguser:testpass@localhost:5432/cg_test
          OFFLINE_DB_PATH: /tmp/test_whitelist.db
          OFFLINE_QUEUE_PATH: /tmp/test_queue.db
          ANPR_SERVICE_URL: http://localhost:8001
        run: pytest tests/ -v --tb=short --cov=edge

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: corepack enable && pnpm install --frozen-lockfile
      - name: Run Node tests
        run: pnpm -r run test

  arm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build ARM64 edge image
        run: docker buildx build --platform linux/arm64 -f edge/Dockerfile.dev ./edge
